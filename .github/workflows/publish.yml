name: Publish

on:
  push:
    tags:
      - 'koishi-plugin-bilibili-videolink-card@*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn build
      - run: npm publish
